services:
  - type: web
    name: cost-benchmarking-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python data/seed.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"

  - type: web
    name: cost-benchmarking-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://cost-benchmarking-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
